name: Auto Release

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Create release tag
        id: meta
        run: |
          short_sha="${GITHUB_SHA::7}"
          timestamp="$(date -u +'%Y%m%dt%H%M%S')"
          tag="v0.0.0-auto-${timestamp}-${short_sha}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${tag}"

      - name: Push release tag
        run: git push origin "${{ steps.meta.outputs.tag }}"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.meta.outputs.tag }}

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" dist/* \
            --repo "${{ github.repository }}" \
            --title "自动发布 ${{ steps.meta.outputs.tag }}" \
            --generate-notes
