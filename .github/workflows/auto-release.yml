name: Auto Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Create release tag
        id: meta
        run: |
          short_sha="${GITHUB_SHA::7}"
          timestamp="$(date -u +'%Y%m%dt%H%M%S')"
          tag="v0.0.0-auto-${timestamp}-${short_sha}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${tag}"

      - name: Push release tag
        run: git push origin "${{ steps.meta.outputs.tag }}"

      - name: Build release binaries
        run: |
          mkdir -p dist
          version="${{ steps.meta.outputs.tag }}"
          commit="${GITHUB_SHA::7}"
          build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          while read -r goos goarch output; do
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build \
              -trimpath \
              -ldflags "-s -w -X main.Version=${version} -X main.Commit=${commit} -X main.BuildDate=${build_date}" \
              -o "dist/${output}" .
          done <<'EOF'
          darwin amd64 cpausage_darwin_amd64
          darwin arm64 cpausage_darwin_arm64
          linux amd64 cpausage_linux_amd64
          linux arm64 cpausage_linux_arm64
          windows amd64 cpausage_windows_amd64.exe
          windows arm64 cpausage_windows_arm64.exe
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t release_files < <(find dist -maxdepth 1 -type f -name 'cpausage_*' | sort)
          gh release create "${{ steps.meta.outputs.tag }}" "${release_files[@]}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.meta.outputs.tag }}" \
            --generate-notes
